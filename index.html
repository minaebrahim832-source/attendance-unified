  if(id==='rpt_today')renderRptToday(c);
  else if(id==='rpt_monthly')renderRptMonthly(c);
  else if(id==='rpt_stats')renderRptStats(c);
  else if(id==='rpt_bday')renderRptBday(c);
  else if(id==='rpt_alerts')renderRptAlerts(c);
  else if(id==='rpt_followup')renderRptFollowup(c);
  else if(id==='rpt_fix')renderRptFix(c);
}

// ===== 📈 إحصائيات =====
let _statsPeriod=90;
function renderRptStats(container){
  let myMembers=getMyMembers();
  let codes=new Set(myMembers.map(m=>m.code));
  let cutoff=null;
  if(_statsPeriod>0){let d=new Date();d.setDate(d.getDate()-_statsPeriod);cutoff=fmtDateKey(d);}
  let recs=(DB.records||[]).filter(r=>codes.has(r.code)&&(!cutoff||r.date>=cutoff));
  let pr=recs.filter(r=>r.status==='حاضر').length,ab=recs.filter(r=>r.status==='غائب').length;
  let overall=pr+ab?Math.round(pr/(pr+ab)*100):0;
  // نسبة كل مجموعة
  let groups={};
  myMembers.forEach(m=>{let g=m.groupId||'_none';if(!groups[g])groups[g]={name:getGroupName(m.groupId)||'بدون خادم',codes:new Set()};groups[g].codes.add(m.code);});
  let gRows=Object.keys(groups).map(g=>{
    let gr=recs.filter(r=>groups[g].codes.has(r.code));
    let p=gr.filter(r=>r.status==='حاضر').length,a=gr.filter(r=>r.status==='غائب').length;
    return{name:groups[g].name,n:groups[g].codes.size,pct:p+a?Math.round(p/(p+a)*100):0,tot:p+a};
  }).filter(x=>x.tot>0).sort((a,b)=>b.pct-a.pct);
  // آخر 6 شهور
  let months=[];
  for(let i=5;i>=0;i--){
    let d=new Date();d.setMonth(d.getMonth()-i);
    let mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    let mr=(DB.records||[]).filter(r=>codes.has(r.code)&&r.date.startsWith(mk));
    let p=mr.filter(r=>r.status==='حاضر').length,a=mr.filter(r=>r.status==='غائب').length;
    months.push({label:d.toLocaleDateString('ar-EG',{month:'long'}),pct:p+a?Math.round(p/(p+a)*100):0,days:[...new Set(mr.map(r=>r.date))].length,tot:p+a});
  }
  let maxPct=Math.max(...months.map(m=>m.pct),1);
  container.innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">📈 إحصائيات الحضور</div>
        <select onchange="_statsPeriod=parseInt(this.value);renderRptStats(document.getElementById('rptContent'))" style="padding:4px 8px;border:1px solid var(--bd);border-radius:6px;font-size:11px">
          ${[[30,'آخر 30 يوم'],[90,'آخر 90 يوم'],[180,'آخر 6 شهور'],[0,'الكل']].map(o=>`<option value="${o[0]}"${o[0]===_statsPeriod?' selected':''}>${o[1]}</option>`).join('')}
        </select>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-val">${myMembers.length}</div><div class="stat-lbl">الأعضاء</div></div>
        <div class="stat-box"><div class="stat-val">${[...new Set(recs.map(r=>r.date))].length}</div><div class="stat-lbl">أيام خدمة</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--g)">${overall}%</div><div class="stat-lbl">نسبة الحضور</div></div>
        <div class="stat-box"><div class="stat-val">${pr}</div><div class="stat-lbl">إجمالي حضور</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📊 اتجاه آخر 6 شهور</div>
      ${months.map(m=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="width:64px;font-size:11px;font-weight:700">${m.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(m.pct/maxPct*100)}%;background:${m.pct>=70?'var(--g)':m.pct>=45?'var(--o)':'var(--r)'}"></div></div>
        <div style="width:66px;font-size:11px;color:var(--txm)">${m.tot?m.pct+'% ('+m.days+'ي)':'—'}</div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">👥 نسبة الحضور لكل مجموعة</div>
      ${gRows.length?gRows.map(g=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="width:110px;font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${g.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${g.pct}%;background:${g.pct>=70?'var(--g)':g.pct>=45?'var(--o)':'var(--r)'}"></div></div>
        <div style="width:76px;font-size:11px;color:var(--txm)">${g.pct}% (${g.n} عضو)</div>
      </div>`).join(''):'<div style="text-align:center;color:var(--txm);padding:14px">لا توجد سجلات في الفترة دي</div>'}
    </div>`;
}

// ===== 🎂 أعياد ميلاد =====
let _bdayMonth=new Date().getMonth()+1;
function renderRptBday(container){
  let myMembers=getMembersPageList();
  let list=myMembers.filter(m=>{
    if(!m.dob)return false;
    let p=m.dob.split('-');return p.length===3&&parseInt(p[1])===_bdayMonth;
  }).map(m=>{
    let p=m.dob.split('-');
    let age=new Date().getFullYear()-parseInt(p[0]);
    return{m,day:parseInt(p[2]),age};
  }).sort((a,b)=>a.day-b.day);
  let monthNames=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  container.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">🎂 أعياد ميلاد الشهر</div>
      <select onchange="_bdayMonth=parseInt(this.value);renderRptBday(document.getElementById('rptContent'))" style="padding:4px 8px;border:1px solid var(--bd);border-radius:6px;font-size:11px">
        ${monthNames.map((n,i)=>`<option value="${i+1}"${i+1===_bdayMonth?' selected':''}>${n}</option>`).join('')}
      </select>
    </div>
    ${list.length?`<div class="tbl-wrap"><table>
      <thead><tr><th>اليوم</th><th>الاسم</th><th>هيتم</th><th>تهنئة</th></tr></thead>
      <tbody>${list.map(x=>`<tr>
        <td><span class="tag tag-p">${x.day} ${monthNames[_bdayMonth-1]}</span></td>
        <td style="font-weight:700"><span class="name-link" onclick="openMemberProfile('${x.m.code}')">${x.m.name}</span></td>
        <td>${x.age} سنة</td>
        <td>${x.m.phone?`<a href="https://wa.me/2${x.m.phone.replace(/^0/,'')}?text=${encodeURIComponent('كل سنة وانت طيب يا '+x.m.name.split(' ')[0]+' 🎉 ربنا يفرح قلبك ويبارك سنة جديدة في حياتك ✝')}" target="_blank" class="btn bg" style="font-size:10px;padding:3px 8px;text-decoration:none">🎉 واتساب</a>`:'—'}</td>
      </tr>`).join('')}</tbody></table></div>`
    :'<div style="text-align:center;color:var(--txm);padding:20px">لا يوجد أعياد ميلاد مسجلة في الشهر ده</div>'}
  </div>`;
}

// ===== ⚠️ تنبيهات الغياب — مع عمود الافتقاد =====
let _alertThresh=3;
function lastFollowUpFor(code){
  let f=(DB.followUps||[]).filter(x=>x.code===code).sort((a,b)=>b.ts-a.ts)[0];
  return f||null;
}
function renderRptAlerts(container){
  let myMembers=getMyMembers();
  let thresh=_alertThresh;
  let recMap={};
  (DB.records||[]).forEach(r=>{if(!recMap[r.code])recMap[r.code]=[];recMap[r.code].push(r);});
  Object.keys(recMap).forEach(code=>recMap[code].sort((a,b)=>b.date.localeCompare(a.date)));
  let alerts=[];
  myMembers.forEach(m=>{
    let recs=recMap[m.code]||[];
    let count=0,lastPresent='',streakStart=null;
    for(let r of recs){if(r.status==='غائب'){count++;streakStart=r.date;}else{lastPresent=r.date;break;}}
    if(count>=thresh){
      let fu=lastFollowUpFor(m.code);
      let fuRelevant=!!(fu&&streakStart&&fu.ts>=parseDateKey(streakStart).getTime());
      alerts.push({m,count,lastPresent,phone:m.phone||'',fu,fuRelevant});
    }
  });
  alerts.sort((a,b)=>b.count-a.count);
  container.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">⚠️ تنبيهات الغياب المتتالي</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txm)">الحد:
        <select onchange="_alertThresh=parseInt(this.value);renderRptAlerts(document.getElementById('rptContent'))" style="padding:3px 6px;border:1px solid var(--bd);border-radius:5px;font-size:11px">
          ${[2,3,4,5,6].map(n=>`<option value="${n}"${n===thresh?' selected':''}>${n} مرات</option>`).join('')}
        </select>
      </div>
    </div>
    ${alerts.length?`
    <div style="margin-bottom:8px;font-size:11px;color:var(--r);font-weight:700">${alerts.length} عضو غائب ${thresh}+ مرات متتالية</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>الاسم</th><th>غياب</th><th>آخر حضور</th><th>آخر افتقاد</th><th></th></tr></thead>
      <tbody>${alerts.map(a=>`<tr>
        <td style="font-weight:700"><span class="name-link" onclick="openMemberProfile('${a.m.code}')">${a.m.name}</span></td>
        <td><span class="tag tag-r">${a.count}</span></td>
        <td style="color:var(--txm);font-size:11px">${a.lastPresent||'لم يحضر'}</td>
        <td style="font-size:11px">${a.fuRelevant?'<span class="tag tag-g">'+new Date(a.fu.ts).toLocaleDateString('ar-EG')+' · '+a.fu.typ+'</span>':(a.fu?'<span class="tag tag-gray">قديم · '+new Date(a.fu.ts).toLocaleDateString('ar-EG')+'</span>':'<span class="tag tag-o">لم يُفتقد</span>')}</td>
        <td style="display:flex;gap:4px">
          <button class="btn bp" style="font-size:10px;padding:3px 8px" onclick="openFollowUp('${a.m.code}')">📞 افتقاد</button>
          ${a.phone?`<a href="https://wa.me/2${a.phone.replace(/^0/,'')}" target="_blank" class="btn bg" style="font-size:10px;padding:3px 8px;text-decoration:none">واتساب</a>`:''}
        </td>
      </tr>`).join('')}</tbody></table></div>`
    :'<div style="text-align:center;color:var(--g);font-weight:700;padding:20px">✓ لا يوجد غياب متتالي يتجاوز '+thresh+' مرات</div>'}
  </div>`;
}

// ===== 📞 تقرير متابعة الافتقاد =====
function renderRptFollowup(container){
  let myMembers=getMyMembers();
  let recMap={};
  (DB.records||[]).forEach(r=>{if(!recMap[r.code])recMap[r.code]=[];recMap[r.code].push(r);});
  Object.keys(recMap).forEach(code=>recMap[code].sort((a,b)=>b.date.localeCompare(a.date)));
  let myCodes=new Set(myMembers.map(m=>m.code));
  // اقتراح بسبب الغياب (مؤشر مساعد فقط — مش شرط للافتقاد)
  let suggested=[];
  myMembers.forEach(m=>{
    let recs=recMap[m.code]||[];
    let count=0,streakStart=null;
    for(let r of recs){if(r.status==='غائب'){count++;streakStart=r.date;}else break;}
    if(count>=_alertThresh){
      let fu=lastFollowUpFor(m.code);
      let fuRelevant=!!(fu&&streakStart&&fu.ts>=parseDateKey(streakStart).getTime());
      suggested.push({m,count,fu,fuRelevant});
    }
  });
  let notDone=suggested.filter(x=>!x.fuRelevant);
  let allFu=(DB.followUps||[]).filter(f=>myCodes.has(f.code)).sort((a,b)=>b.ts-a.ts);
  let recent=allFu.slice(0,30);
  // إحصائية: كام عضو مختلف اتفتقد
  let uniqueVisited=new Set(allFu.map(f=>f.code)).size;
  container.innerHTML=`
    <div class="stats-row" style="margin-bottom:12px">
      <div class="stat-box"><div class="stat-val">${allFu.length}</div><div class="stat-lbl">إجمالي الافتقادات</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--g)">${uniqueVisited}</div><div class="stat-lbl">عضو اتفتقد</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--o)">${notDone.length}</div><div class="stat-lbl">غايبين محتاجين متابعة</div></div>
      <div class="stat-box"><div class="stat-val">${myMembers.length}</div><div class="stat-lbl">إجمالي الأعضاء</div></div>
    </div>
    <div class="card">
      <div class="card-title">➕ سجّل افتقاد لأي عضو</div>
      <div style="font-size:11px;color:var(--txm);margin-bottom:8px">الافتقاد رعاية مستمرة — تقدر تسجّل مكالمة أو زيارة لأي عضو في أي وقت، سواء حضر أو غاب</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <input id="fuPickSearch" placeholder="🔍 اكتب اسم العضو..." list="fuPickList" style="flex:1;min-width:180px;padding:8px 10px;border:1.5px solid var(--bd);border-radius:7px;font-size:12px">
        <datalist id="fuPickList">${myMembers.map(m=>`<option value="${(m.name||'').replace(/"/g,'&quot;')} — ${m.code}"></option>`).join('')}</datalist>
        <button class="btn bp" style="font-size:12px" onclick="fuPickAndOpen()">📞 تسجيل افتقاد</button>
      </div>
    </div>
    ${notDone.length?`<div class="card">
      <div class="card-title" style="color:var(--o)">💡 مقترحون للافتقاد (غياب متتالي ${_alertThresh}+ مرات)</div>
      <div style="font-size:11px;color:var(--txm);margin-bottom:6px">اقتراح مساعد — مش إلزام؛ ممكن تفتقد أي حد غيرهم برضو</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>الاسم</th><th>الخادم</th><th>غياب</th><th></th></tr></thead>
        <tbody>${notDone.map(x=>`<tr>
          <td style="font-weight:700"><span class="name-link" onclick="openMemberProfile('${x.m.code}')">${x.m.name}</span></td>
          <td style="font-size:11px">${getGroupName(x.m.groupId)||'—'}</td>
          <td><span class="tag tag-r">${x.count}</span></td>
          <td><button class="btn bp" style="font-size:10px;padding:3px 8px" onclick="openFollowUp('${x.m.code}')">📞 افتقاد</button></td>
        </tr>`).join('')}</tbody></table></div>
    </div>`:''}
    <div class="card">
      <div class="card-title">📝 آخر الافتقادات المسجلة (${allFu.length})</div>
      ${recent.length?`<div class="tbl-wrap"><table>
        <thead><tr><th>التاريخ</th><th>العضو</th><th>النوع</th><th>النتيجة</th><th>بواسطة</th></tr></thead>
        <tbody>${recent.map(f=>{
          let m=(DB.members||[]).find(x=>x.code===f.code)||{name:f.code};
          return`<tr>
            <td style="font-size:11px">${new Date(f.ts).toLocaleDateString('ar-EG')}</td>
            <td style="font-weight:700"><span class="name-link" onclick="openMemberProfile('${f.code}')">${m.name}</span></td>
            <td><span class="tag tag-p">${f.typ}</span></td>
            <td style="font-size:11px">${f.note||'—'}</td>
            <td style="font-size:11px;color:var(--txm)">${f.by}</td>
          </tr>`;}).join('')}</tbody></table></div>`
      :'<div style="text-align:center;color:var(--txm);padding:14px">لا يوجد افتقادات مسجلة بعد — ابدأ بتسجيل افتقاد من فوق</div>'}
    </div>`;
}
// اختيار عضو من البحث الحر وفتح نافذة الافتقاد
function fuPickAndOpen(){
  let v=(getVal('fuPickSearch')||'').trim();
  if(!v){toast('اكتب اسم العضو الأول','warn',true);return;}
  // الصيغة: "الاسم — الكود" — نستخرج الكود
  let code=null;
  let m=v.match(/—\s*(M\d+)\s*$/i);
  if(m)code=m[1];
  if(!code){
    // بحث بالاسم في نطاق الخادم
    let found=getMyMembers().find(x=>(x.name||'').trim()===v.trim());
    if(found)code=found.code;
  }
  if(!code){toast('اختر العضو من القائمة','warn',true);return;}
  openFollowUp(code);
}
</script>

<script>
'use strict';
/* ===== V3: إدارة المستخدمين + معالج بداية السنة + الترقية + موسم المسرح + الأرشفة السنوية ===== */

// ===== صفحة المستخدمين — نسخة موسّعة (نشِط/معطّل + أدوات) =====
function renderUsersPage(){
  let r=currentUser.role;
  let all;
  if(isSuperAdmin())all=(DB.users||[]).filter(u=>u.role!=='viewer');
  else if(isServiceAdmin())all=(DB.users||[]).filter(u=>u.serviceId===currentUser.serviceId&&u.role!=='viewer');
  else if(r==='section_admin')all=(DB.users||[]).filter(u=>(u.role==='servant'||u.role==='theatre_servant')&&u.serviceId===currentUser.serviceId&&u.sectionId===currentUser.sectionId);
  else if(r==='category_admin')all=(DB.users||[]).filter(u=>(u.role==='servant'||u.role==='theatre_servant')&&u.serviceId===currentUser.serviceId&&u.categoryId===currentUser.categoryId);
  else if(r==='year_admin')all=(DB.users||[]).filter(u=>u.role==='servant'&&u.serviceId===currentUser.serviceId&&u.year===currentUser.year);
  else all=[];
  let active=all.filter(u=>u.active!==false);
  let inactive=all.filter(u=>u.active===false);

    <div class="card">

        <div class="card-title" style="margin-bottom:0">👤 المستخدمون (${active.length})</div>
        <button class="btn bp" onclick="openAddUser()">+ إضافة</button>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>الاسم</th><th>الدور</th><th>الخدمة</th><th></th></tr></thead>
        <tbody>${active.map(u=>{
          let isServantRole=u.role==='servant'||u.role==='theatre_servant';
          let scopeInfo=[u.year,u.sectionId,u.categoryId].filter(Boolean).join(' · ');
          return`<tr>
          <td style="font-weight:700">${u.name}${u.mustChangePw?' <span class="tag tag-o">🔑 مؤقتة</span>':''}</td>
          <td><span class="tag tag-p">${getRoleLabel(u.role)}</span>${scopeInfo?'<div style="font-size:10px;color:var(--txm)">'+scopeInfo+'</div>':''}</td>
          <td>${getServiceName(u.serviceId)||'—'}</td>
          <td><div style="display:flex;gap:3px;flex-wrap:wrap">
            <button class="btn bw" style="font-size:10px;padding:3px 7px" onclick="editUser('${u.id}')" title="تعديل">✎</button>
            ${canTools&&u.role!=='superadmin'?`<button class="btn bw" style="font-size:10px;padding:3px 7px" onclick="openTempPw('${u.id}')" title="كلمة سر مؤقتة">🔑</button>`:''}
            ${isSuperAdmin()&&isServantRole?`<button class="btn bw" style="font-size:10px;padding:3px 7px" onclick="openTransferServant('${u.id}')" title="نقل لخدمة/دور آخر">🔄</button>`:''}
            ${isSuperAdmin()&&isServantRole?`<button class="btn bw" style="font-size:10px;padding:3px 7px" onclick="openHandover('${u.id}')" title="تسليم مجموعته">📦</button>`:''}
            ${isSuperAdmin()&&!isServantRole&&u.role!=='superadmin'?`<button class="btn bw" style="font-size:10px;padding:3px 7px" onclick="openReplaceAdmin('${u.id}')" title="استبدال المسئول">♻️</button>`:''}
            ${isSuperAdmin()&&u.role!=='superadmin'?`<button class="btn bgr" style="font-size:10px;padding:3px 7px" onclick="deactivateUser('${u.id}')" title="تعطيل">⏸</button>`:''}
          </div></td>
        </tr>`;}).join('')}</tbody>
      </table></div>
    </div>
    ${inactive.length?`<div class="card">
      <div class="card-title" style="color:var(--txm)">⏸ غير نشطين (${inactive.length}) — أسماؤهم محفوظة للسجلات القديمة</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>الاسم</th><th>الدور</th><th>الخدمة</th><th></th></tr></thead>
        <tbody>${inactive.map(u=>`<tr style="opacity:.65">
          <td style="font-weight:700">${u.name}</td>
          <td><span class="tag tag-gray">${getRoleLabel(u.role)}</span></td>
          <td>${getServiceName(u.serviceId)||'—'}</td>
          <td>${isSuperAdmin()?`<button class="btn bg" style="font-size:10px;padding:3px 8px" onclick="reactivateUser('${u.id}')">▶ تفعيل</button>`:''}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}
  </div>`;
}

// ===== تعديل مستخدم — إصلاح باج '${id}' الأصلي =====
function editUser(id){
  let u=(DB.users||[]).find(x=>x.id===id);
  if(!u)return;
  document.getElementById('memberModalBox').classList.remove('wide');
  document.getElementById('memberModalBox').innerHTML=`
    <div class="modal-title">✎ تعديل: ${u.name}</div>
    <div class="field"><label>الاسم</label><input id="eu_name" value="${u.name}"></div>
    <div class="field"><label>كلمة السر الجديدة (اتركها فارغة للإبقاء)</label><input type="password" id="eu_pw"></div>
    <div id="eu_err" style="color:var(--r);font-size:11px;margin-bottom:6px"></div>
    <div class="modal-btns">
      <button class="btn bp" id="eu_save_btn">✓ حفظ</button>
      <button class="btn br" onclick="deleteUser('${u.id}','${(u.name||'').replace(/'/g,'')}')">🗑 حذف</button>
      <button class="btn bw" onclick="closeModal()">إلغاء</button>
    </div>`;
  document.getElementById('eu_save_btn').onclick=async()=>{
    let err=document.getElementById('eu_err');
    let cur=(DB.users||[]).find(x=>x.id===id);
    if(!cur){err.textContent='المستخدم غير موجود';return;}
    let upd=Object.assign({},cur);
    upd.name=getVal('eu_name');
    let newpw=getVal('eu_pw').trim();
    if(newpw.length>=3){
      if(await isViewerPw(newpw)){err.textContent='كلمة السر دي محجوزة';return;}
      for(let uu of (DB.users||[])){
        if(uu.id===id)continue;
        if(await pwEquals(uu.password,newpw)){err.textContent='كلمة السر دي مستخدمة بالفعل';return;}
      }
      upd.password=await hashPw(newpw);
      upd.mustChangePw=false;
    }
    let idx=(DB.users||[]).findIndex(x=>x.id===id);
    if(idx>=0)DB.users[idx]=upd;
    logActivity('تعديل مستخدم: '+upd.name);
    await saveDB({usersPatch:{upsert:[upd]}});
    closeModal();renderUsersPage();
  };
  document.getElementById('memberModal').classList.add('on');
}

// ===== تعطيل / تفعيل =====
function membersOfGroup(groupId){return (DB.members||[]).filter(m=>m.active!==false&&m.groupId===groupId);}
function deactivateUser(id){
  let u=(DB.users||[]).find(x=>x.id===id);if(!u)return;
  if((u.role==='servant'||u.role==='theatre_servant')&&u.groupId&&membersOfGroup(u.groupId).length){

    logActivity('تعطيل مستخدم: '+u.name);
    await saveDB({usersPatch:{upsert:[u]}});
    renderUsersPage();toast('تم التعطيل','ok',true);

}
async function reactivateUser(id){

// ===== أرشفة اسم مجموعة (للتقارير التاريخية) =====
function archiveGroupName(groupId,name,serviceId){
  if(!groupId)return null;
  return{groupId,name,serviceId:serviceId||'',closedAt:todayKey()};
}

function openHandover(oldId){
  let old=(DB.users||[]).find(x=>x.id===oldId);if(!old)return;
  let grpMembers=membersOfGroup(old.groupId);
  let candidates=(DB.users||[]).filter(u=>u.active!==false&&u.id!==oldId&&(u.role==='servant'||u.role==='theatre_servant')&&u.serviceId===old.serviceId);
  let box=document.getElementById('memberModalBox');
  box.classList.remove('wide');
  box.innerHTML=`
    <div class="modal-title">📦 تسليم مجموعة: ${old.name}</div>
    <div class="status-bar info" style="font-size:11px">المجموعة فيها <strong>${grpMembers.length}</strong> عضو — هيتنقلوا لمجموعة الخادم الجديد. السجلات القديمة هتفضل باسم «${old.name}».</div>

    <div id="ho_err" style="color:var(--r);font-size:11px;margin-bottom:6px"></div>
    <div class="modal-btns">
      <button class="btn bp" onclick="confirmHandover('${oldId}')">✓ تسليم</button>
      <button class="btn bw" onclick="closeModal()">إلغاء</button>
    </div>`;
  document.getElementById('memberModal').classList.add('on');
}
async function confirmHandover(oldId){
  let old=(DB.users||[]).find(x=>x.id===oldId);
  let nu=(DB.users||[]).find(x=>x.id===getVal('ho_new'));
  let err=document.getElementById('ho_err');
  if(!old||!nu){err.textContent='اختر الخادم المستلم';return;}
  let grpMembers=membersOfGroup(old.groupId);
  let updMembers=grpMembers.map(m=>Object.assign({},m,{groupId:nu.groupId}));
  updMembers.forEach(um=>{let i=DB.members.findIndex(x=>x.code===um.code);if(i>=0)DB.members[i]=um;});
  let ga=archiveGroupName(old.groupId,old.name,old.serviceId);
  if(ga){if(!DB.groupArchive)DB.groupArchive=[];DB.groupArchive.push(ga);}
  let updUsers=[];
  let deact=document.getElementById('ho_deact').checked;
  if(deact){old.active=false;updUsers.push(old);}
  logActivity('تسليم مجموعة: من '+old.name+' إلى '+nu.name+' ('+grpMembers.length+' عضو)'+(deact?' + تعطيل':''));
  await saveDB({membersPatch:{upsert:updMembers},usersPatch:updUsers.length?{upsert:updUsers}:undefined,groupArchiveAdd:ga?[ga]:undefined});
  closeModal();renderUsersPage();toast('✓ اتسلمت المجموعة لـ'+nu.name,'ok',true);
}

// ===== ② ترقية الخدمات العادية =====
function renderWizardPromotion(){
  let regular=(DB.services||[]).filter(s=>s.type!=='theatre');
  let rows=[];
  regular.forEach(svc=>{
    let mems=(DB.members||[]).filter(m=>m.active!==false&&m.serviceId===svc.id&&!m.pendingIncoming);
    let byGrade={};
    mems.forEach(m=>{let g=normGrade(m.grade)||'(بدون سنة)';if(!byGrade[g])byGrade[g]=0;byGrade[g]++;});
    Object.keys(byGrade).sort((a,b)=>GRADE_ORDER.indexOf(a)-GRADE_ORDER.indexOf(b)).forEach(g=>{
      let ng=g==='(بدون سنة)'?g:nextGrade(g);
      let crosses=g!=='(بدون سنة)'&&stageOf(g)!==stageOf(ng);
      rows.push({svcId:svc.id,svcName:svc.name,grade:g,next:ng,count:byGrade[g],crosses});
    });
  });
  let crossRows=rows.filter(r=>r.crosses);
  let box=document.getElementById('memberModalBox');
  box.classList.add('wide');
  box.innerHTML=`
    <div class="modal-title">🎓 ② ترقية الخدمات العادية — معاينة</div>
    ${rows.length?`<div class="tbl-wrap" style="max-height:220px;margin-bottom:10px"><table>
      <thead><tr><th>الخدمة</th><th>من</th><th>إلى</th><th>عدد</th></tr></thead>
      <tbody>${rows.map(r=>`<tr${r.crosses?' style="background:var(--ol)"':''}>
        <td style="font-size:11px">${r.svcName}</td>
        <td style="font-weight:700">${r.grade}</td>
        <td style="font-weight:700;color:${r.crosses?'var(--o)':'var(--g)'}">${r.grade==='(بدون سنة)'?'— بدون تغيير —':r.next}${r.crosses?' 🎓':''}</td>
        <td>${r.count}</td>
      </tr>`).join('')}</tbody></table></div>`:'<div class="status-bar warn">لا يوجد أعضاء في خدمات عادية</div>'}
    ${crossRows.length?`<div class="card-title" style="font-size:12px">🎓 عابرو المرحلة — اختر الخدمة المستقبلة لكل مجموعة:</div>
    ${crossRows.map((r,i)=>{
      let targetStage=stageOf(r.next);
      let candidates=regular.filter(s=>s.id!==r.svcId);
      let guess=candidates.find(s=>s.name.includes(targetStage));
      return`<div class="form-grid" style="align-items:center;margin-bottom:4px">
        <div style="font-size:11px;font-weight:700">${r.svcName} · ${r.grade} (${r.count}) ← مرحلة ${targetStage}</div>
        <select id="wp_target_${i}" data-svc="${r.svcId}" data-grade="${r.grade}">
          <option value="_stay">يفضلوا في نفس الخدمة</option>
          ${candidates.map(s=>`<option value="${s.id}"${guess&&guess.id===s.id?' selected':''}>→ ${s.name}</option>`).join('')}
        </select>
      </div>`;}).join('')}`:''}
    <div class="field" style="margin-top:8px"><label style="display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" id="wp_bumpusers" checked style="width:auto"> ترقية «سنة» الخدام ومسئولي السنوات تلقائياً (اللي سنتهم مش هتعدي مرحلة)
    </label></div>
    <div class="modal-btns">
      <button class="btn bg" onclick="executePromotion()">✓ تنفيذ الترقية</button>
      <button class="btn bw" onclick="openSeasonWizard()">رجوع</button>
    </div>`;
  window._wpCrossRows=crossRows;
}
async function executePromotion(){
  let crossRows=window._wpCrossRows||[];
  let targets={};
  crossRows.forEach((r,i)=>{targets[r.svcId+'||'+r.grade]=getVal('wp_target_'+i);});
  let regularIds=new Set((DB.services||[]).filter(s=>s.type!=='theatre').map(s=>s.id));
  let updMembers=[];
  (DB.members||[]).forEach(m=>{
    if(m.active===false||!regularIds.has(m.serviceId)||m.pendingIncoming)return;
    let g=normGrade(m.grade);
    if(!g||GRADE_ORDER.indexOf(g)<0)return;
    let ng=nextGrade(g);
    if(ng===g)return; // تخرج
    let upd=Object.assign({},m,{grade:ng});
    if(stageOf(g)!==stageOf(ng)){
      let t=targets[m.serviceId+'||'+g];
      if(t&&t!=='_stay'){
        upd.serviceId=t;upd.groupId='';upd.pendingIncoming=true;
      }
    }
    updMembers.push(upd);
  });
  let updUsers=[];
  if(document.getElementById('wp_bumpusers')&&document.getElementById('wp_bumpusers').checked){
    (DB.users||[]).forEach(u=>{
      if(u.active===false)return;
      if(!(u.role==='servant'||u.role==='year_admin'))return;
      if(!regularIds.has(u.serviceId))return;
      let g=normGrade(u.year);
      if(!g||GRADE_ORDER.indexOf(g)<0)return;
      let ng=nextGrade(g);
      if(ng===g||stageOf(g)!==stageOf(ng))return; // عابرو المرحلة بيتظبطوا يدوي من أدوات النقل
      updUsers.push(Object.assign({},u,{year:ng}));
    });
  }
  if(!updMembers.length&&!updUsers.length){toast('مفيش حاجة تتغير','warn',true);return;}
  updMembers.forEach(um=>{let i=DB.members.findIndex(x=>x.code===um.code);if(i>=0)DB.members[i]=um;});
  updUsers.forEach(uu=>{let i=DB.users.findIndex(x=>x.id===uu.id);if(i>=0)DB.users[i]=uu;});
  let movedCount=updMembers.filter(m=>m.pendingIncoming).length;
  logActivity('ترقية سنوية: '+updMembers.length+' عضو ('+movedCount+' وافد لخدمة جديدة)'+(updUsers.length?' + '+updUsers.length+' خادم/مسئول':''));
  await saveDB({membersPatch:{upsert:updMembers},usersPatch:updUsers.length?{upsert:updUsers}:undefined});
  closeModal();renderCurrentPage();

function suggestCategory(svc,grade){
  let st=stageOf(grade);
  if(!st||!svc||!svc.categories)return'';
  return svc.categories.find(c=>c.includes(st))||'';
}

async function executeTheatreSeason(){
  let theatreIds=new Set((DB.services||[]).filter(s=>s.type==='theatre').map(s=>s.id));
  let updMembers=[];
  (DB.members||[]).forEach(m=>{
    if(m.active===false||!theatreIds.has(m.serviceId))return;
    let svc=(DB.services||[]).find(s=>s.id===m.serviceId);
    let g=normGrade(m.grade);
    let ng=(g&&GRADE_ORDER.indexOf(g)>=0)?nextGrade(g):g;
    let sug=suggestCategory(svc,ng);
    let upd=Object.assign({},m,{grade:ng||m.grade,seasonStatus:'pending'});
    if(sug&&sug!==m.categoryId)upd.suggestedCategory=sug;else delete upd.suggestedCategory;
    updMembers.push(upd);
  });
  if(!updMembers.length){toast('مفيش أعضاء مسرح','warn',true);return;}
  updMembers.forEach(um=>{let i=DB.members.findIndex(x=>x.code===um.code);if(i>=0)DB.members[i]=um;});
  logActivity('بدء موسم مسرح جديد: '+updMembers.length+' عضو في انتظار التأكيد');
  await saveDB({membersPatch:{upsert:updMembers}});
  closeModal();renderCurrentPage();
  toast('🎭 بدأ الموسم — '+updMembers.length+' في انتظار التأكيد','ok',true);
}

function previewYearArchive(){
  let cutoff=getVal('ya_cutoff');
  let n=(DB.records||[]).filter(r=>r.date<cutoff).length;
  let total=(DB.records||[]).length;
  document.getElementById('ya_preview').textContent=n?('هيتأرشف '+n+' سجل من إجمالي '+total+' — ويفضل '+(total-n)+' سجل نشط'):'لا يوجد سجلات أقدم من التاريخ ده';
  document.getElementById('ya_go').style.display=n?'':'none';

async function executeYearArchive(){
  let cutoff=getVal('ya_cutoff');
  let label=getVal('ya_label').trim()||('أرشيف حتى '+cutoff);
  let toArch=(DB.records||[]).filter(r=>r.date<cutoff);
  if(!toArch.length)return;
  let dates=toArch.map(r=>r.date).sort();
  let archId=SB_ROW_ID+'_arch_'+Date.now();
  try{
    let r=await _sb.from('attendance_db').upsert({id:archId,data:{label,from:dates[0],to:dates[dates.length-1],count:toArch.length,records:toArch},updated_at:new Date().toISOString()});
    if(r.error)throw r.error;
  }catch(e){toast('⚠ فشل رفع الأرشيف — متمسحش حاجة','err',true);return;}
  DB.records=(DB.records||[]).filter(r=>r.date>=cutoff);
  if(!DB.archives)DB.archives=[];
  let meta={id:archId,label,from:dates[0],to:dates[dates.length-1],count:toArch.length};
  DB.archives.push(meta);
  logActivity('إغلاق سنة خدمية: أرشفة '+toArch.length+' سجل ('+label+')');
  await saveDB({skipArrMerge:true,archivesAdd:[meta]});
  closeModal();renderSettingsPage();
  toast('✓ اتأرشف '+toArch.length+' سجل بأمان','ok',true);
}
async function downloadArchive(archId){
  try{
    let{data,error}=await _sb.from('attendance_db').select('data').eq('id',archId).single();
    if(error||!data)throw error;
    let b=new Blob([JSON.stringify(data.data,null,2)],{type:'application/json'});
    let a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download=(data.data.label||archId)+'.json';a.click();
  }catch(e){toast('⚠ تعذر تحميل الأرشيف','err',true);}
}

<script>
'use strict';
/* V3: سنين دراسية مفلترة حسب مرحلة الخدمة (من اسمها) */
function gradesForService(svcId){
  let svc=(DB.services||[]).find(x=>x.id===svcId);
  if(!svc)return GRADE_ORDER;
  let n=(svc.name||'').replace(/اعدادي/g,'إعدادي');
  let out=[];
  if(n.includes('حضانة'))out=out.concat(GRADE_ORDER.filter(g=>stageOf(g)==='حضانة'));
  if(n.includes('ابتدائي'))out=out.concat(GRADE_ORDER.filter(g=>stageOf(g)==='ابتدائي'));
  if(n.includes('إعدادي'))out=out.concat(GRADE_ORDER.filter(g=>stageOf(g)==='إعدادي'));
  if(n.includes('ثانوي'))out=out.concat(GRADE_ORDER.filter(g=>stageOf(g)==='ثانوي'));
  if(n.includes('شباب')||n.includes('جامعة'))out=out.concat(GRADE_ORDER.filter(g=>stageOf(g)==='شباب'));
  return out.length?out:GRADE_ORDER; // لو اسم الخدمة مفيهوش مرحلة معروفة — القائمة الكاملة
}
</script>

<script>

// ===== نموذج جدول الأولاد (HTML) =====

// إنشاء عضو الأسرة + الربط الذكي بالزوج/ة
async function confirmAddFamilyMember(svcId){
  let name=getVal('am_name').trim();
  let err=document.getElementById('am_err');
  if(!name){err.textContent='الاسم مطلوب';return;}
  let servantId=isServant()?currentUser.id:(getVal('am_servant')||null);
  let servant=(DB.users||[]).find(u=>u.id===servantId)||(isServant()?currentUser:null);
  let groupId=servant?servant.groupId:'';

  let marital=getVal('fam_marital');
  let spouseName=getVal('fam_spouse_name').trim();
  let children=collectChildren();
  let years=getVal('fam_years');

  let m={
    code:nextCode(),name,
    phone:getVal('am_phone').trim(),
    grade:'تخرج', // أولياء الأمور دايماً "تخرج" — الترقية تتجاهلهم
    father:getVal('am_father').trim(),
    addr:getVal('am_addr').trim(),
    notes:getVal('am_notes').trim(),
    serviceId:svcId,categoryId:'',sectionId:'',groupId,
    // حقول الأسرة
    isFamily:true,
    maritalStatus:marital,
    job:getVal('fam_job').trim(),
    marriageYears:years!==''?parseInt(years):null,
    children:children,
    spouseCode:'',spouseName:''
  };

  let toSave=[m];
  // الربط الذكي بالزوج/ة (فقط لو متزوج/ة)
  if(isMarried(marital)&&spouseName){
    let peer=familyPeersFor(svcId,m.code).find(p=>p.name.trim()===spouseName.trim());
    if(peer){
      // موجود — نربط الطرفين
      m.spouseCode=peer.code;m.spouseName=peer.name;
      let peerUpd=Object.assign({},peer,{
        spouseCode:m.code,spouseName:m.name,
        // بيانات البيت المشتركة تتزامن
        marriageYears:m.marriageYears,children:m.children,
        maritalStatus:peer.maritalStatus&&isMarried(peer.maritalStatus)?peer.maritalStatus:(marital==='متزوج'?'متزوجة':'متزوج')
      });
      let pi=DB.members.findIndex(x=>x.code===peer.code);
      if(pi>=0)DB.members[pi]=peerUpd;
      toSave.push(peerUpd);
    }else{
      // مش موجود — ننشئ ملف الطرف التاني تلقائياً بنفس بيانات البيت
      let spouseMarital=marital==='متزوج'?'متزوجة':'متزوج';
      let sp={
        code:'',name:spouseName,phone:'',grade:'تخرج',
        father:'',addr:m.addr,notes:'',
        serviceId:svcId,categoryId:'',sectionId:'',groupId:m.groupId,
        isFamily:true,maritalStatus:spouseMarital,job:'',
        marriageYears:m.marriageYears,children:m.children,
        spouseCode:m.code,spouseName:m.name,
        _autoCreated:true
      };
      // كود الطرف التاني بيتحدد بعد كود العضو الأساسي
      DB.members.push(m); // مؤقتاً عشان nextCode يحسبه
      sp.code=nextCode();
      DB.members.pop();
      m.spouseCode=sp.code;m.spouseName=sp.name;
      toSave.push(sp);
      DB.members.push(sp);
    }
  }
  DB.members.push(m);
  logActivity('إضافة فرد أسرة: '+m.name+' ('+m.code+')'+(m.spouseCode?' — مربوط بـ'+m.spouseName:''));
  await saveDB({membersPatch:{upsert:toSave}});
  closeModal();
  document.getElementById('memberModalBox').classList.remove('wide');
  renderMembersPage();
  toast('✓ اتسجل '+m.name+(m.spouseCode?' ومربوط بـ'+m.spouseName:''),'ok',true);
}

function editFamilyMember(code){

async function saveFamilyEdit(code){
  let m=(DB.members||[]).find(x=>x.code===code);if(!m)return;
  let upd=Object.assign({},m);
  upd.name=getVal('em_name').trim()||m.name;
  upd.phone=getVal('em_phone').trim();
  upd.father=getVal('em_father').trim();
  upd.addr=getVal('em_addr').trim();
  upd.notes=getVal('em_notes').trim();
  let newMarital=getVal('fam_marital');
  upd.maritalStatus=newMarital;
  upd.job=getVal('fam_job').trim();
  let years=getVal('fam_years');
  upd.marriageYears=years!==''?parseInt(years):null;
  upd.children=collectChildren();
  let svcId=m.serviceId;
  let toSave=[upd];

  // الكاهن المسئول
  let servantSel=document.getElementById('em_servant');
  if(servantSel){
    let sv=(DB.users||[]).find(u=>u.id===servantSel.value);
    if(sv){upd.groupId=sv.groupId;}
    else if(!servantSel.value){upd.groupId='';}
  }

  // ===== منطق الربط عند التعديل =====
  let oldSpouseCode=m.spouseCode||'';
  let spouseNameField=getVal('fam_spouse_name').trim();

  if(!isMarried(newMarital)){
    // تغيّرت الحالة لغير متزوج → فك الربط من الطرفين
    if(oldSpouseCode){
      let peer=(DB.members||[]).find(x=>x.code===oldSpouseCode);
      if(peer){
        let peerUpd=Object.assign({},peer,{spouseCode:'',spouseName:''});
        let pi=DB.members.findIndex(x=>x.code===peer.code);if(pi>=0)DB.members[pi]=peerUpd;
        toSave.push(peerUpd);
      }
    }
    upd.spouseCode='';upd.spouseName='';upd.marriageYears=null;
  }else{
    // متزوج/ة — نطبّق الربط الذكي
    if(spouseNameField){
      let peer=familyPeersFor(svcId,code).find(p=>p.name.trim()===spouseNameField);
      if(peer&&peer.code!==oldSpouseCode){
        // ربط جديد بشخص موجود — نفك القديم لو كان مختلف
        if(oldSpouseCode&&oldSpouseCode!==peer.code){
          let oldPeer=(DB.members||[]).find(x=>x.code===oldSpouseCode);
          if(oldPeer){let op=Object.assign({},oldPeer,{spouseCode:'',spouseName:''});let oi=DB.members.findIndex(x=>x.code===oldPeer.code);if(oi>=0)DB.members[oi]=op;toSave.push(op);}
        }
        upd.spouseCode=peer.code;upd.spouseName=peer.name;
        let peerUpd=Object.assign({},peer,{spouseCode:code,spouseName:upd.name,marriageYears:upd.marriageYears,children:upd.children,maritalStatus:isMarried(peer.maritalStatus)?peer.maritalStatus:(newMarital==='متزوج'?'متزوجة':'متزوج')});
        let pi=DB.members.findIndex(x=>x.code===peer.code);if(pi>=0)DB.members[pi]=peerUpd;
        toSave.push(peerUpd);
      }else if(peer&&peer.code===oldSpouseCode){
        // نفس الزوج — نزامن بيانات البيت المشتركة
        let peerUpd=Object.assign({},peer,{spouseName:upd.name,marriageYears:upd.marriageYears,children:upd.children});
        let pi=DB.members.findIndex(x=>x.code===peer.code);if(pi>=0)DB.members[pi]=peerUpd;
        toSave.push(peerUpd);
      }else if(!peer){
        // اسم جديد مش موجود → ننشئ الطرف التاني
        if(oldSpouseCode){
          let oldPeer=(DB.members||[]).find(x=>x.code===oldSpouseCode);
          if(oldPeer){let op=Object.assign({},oldPeer,{spouseCode:'',spouseName:''});let oi=DB.members.findIndex(x=>x.code===oldPeer.code);if(oi>=0)DB.members[oi]=op;toSave.push(op);}
        }
        let sp={code:'',name:spouseNameField,phone:'',grade:'تخرج',father:'',addr:upd.addr,notes:'',
          serviceId:svcId,categoryId:'',sectionId:'',groupId:upd.groupId,isFamily:true,
          maritalStatus:newMarital==='متزوج'?'متزوجة':'متزوج',job:'',marriageYears:upd.marriageYears,
          children:upd.children,spouseCode:code,spouseName:upd.name,_autoCreated:true};
        sp.code=nextCode();
        upd.spouseCode=sp.code;upd.spouseName=sp.name;
        DB.members.push(sp);toSave.push(sp);
      }
    }else if(oldSpouseCode){
      // مسح اسم الزوج مع بقاء الحالة متزوج → نفك الربط بس
      let peer=(DB.members||[]).find(x=>x.code===oldSpouseCode);
      if(peer){let pu=Object.assign({},peer,{spouseCode:'',spouseName:''});let pi=DB.members.findIndex(x=>x.code===peer.code);if(pi>=0)DB.members[pi]=pu;toSave.push(pu);}
      upd.spouseCode='';upd.spouseName='';
    }
  }

  let idx=DB.members.findIndex(x=>x.code===code);
  if(idx>=0)DB.members[idx]=upd;
  logActivity('تعديل فرد أسرة: '+upd.name+' ('+code+')');
  await saveDB({membersPatch:{upsert:toSave}});
  closeModal();
  document.getElementById('memberModalBox').classList.remove('wide');
  renderMembersPage();
  toast('✓ اتحفظ','ok',true);
}

    <input id="famYearsFrom" type="number" min="0" placeholder="1" style="width:60px;padding:5px 7px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px">
    <span style="font-size:11px;color:var(--txm)">إلى (اختياري)</span>
    <input id="famYearsTo" type="number" min="0" placeholder="فأكتر" style="width:70px;padding:5px 7px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px">
    <button class="btn bp" style="font-size:11px" onclick="filterFamilyByYears()">بحث</button>
    <button class="btn bw" style="font-size:11px" onclick="clearFamilyYearsFilter()">↺ الكل</button>`;
  wrap.parentNode.insertBefore(famBox,wrap.nextSibling);
};
function familyHouses(members){
  let seen=new Set();
  let houses=[];
  members.forEach(m=>{
    if(seen.has(m.code))return;
    seen.add(m.code);
    let spouse=m.spouseCode?members.find(x=>x.code===m.spouseCode):null;
    if(spouse)seen.add(spouse.code);
    houses.push({main:m,spouse});
  });
  return houses;
}
function renderFamilyHouseRows(houses){
  if(!houses.length)return '<tr><td colspan="5" style="text-align:center;color:var(--txm);padding:16px">لا يوجد بيوت مطابقة</td></tr>';
  return houses.map(h=>{
    let m=h.main,sp=h.spouse;
    let names=sp?`${m.name} <span style="color:var(--txm)">و</span> ${sp.name}`:m.name;
    let yrs=m.marriageYears!=null?m.marriageYears+' سنة':'—';
    let phone=m.phone||(sp&&sp.phone)||'';
    return `<tr>
      <td><span class="tag tag-v">🏠</span></td>
      <td style="font-weight:700"><span class="name-link" onclick="openMemberProfile('${m.code}')">${names}</span></td>
      <td><span class="tag tag-p">${yrs}</span></td>
      <td>${phone?`<a href="https://wa.me/2${phone.replace(/^0/,'')}" target="_blank" style="text-decoration:none">💬 ${phone}</a>`:'—'}</td>
      <td><button class="btn bw" style="font-size:10px;padding:3px 7px" onclick="openMemberProfile('${m.code}')">فتح البيت</button></td>
    </tr>`;
  }).join('');
}
function filterFamilyByYears(){
  let fromV=getVal('famYearsFrom').trim();
  let toV=getVal('famYearsTo').trim();
  if(fromV===''&&toV===''){clearFamilyYearsFilter();return;}
  let from=fromV!==''?parseInt(fromV):0;
  let to=toV!==''?parseInt(toV):Infinity;
  let base=getMembersPageList().filter(m=>m.isFamily&&isMarried(m.maritalStatus)&&m.marriageYears!=null&&m.marriageYears>=from&&m.marriageYears<=to);
  let houses=familyHouses(base);
  let tbody=document.getElementById('membersTbody');
  let table=document.getElementById('membersTable');
  if(table){
    let thead=table.querySelector('thead tr');
    if(thead)thead.innerHTML='<th></th><th>البيت</th><th>سنين الزواج</th><th>تواصل</th><th></th>';
  }
  if(tbody)tbody.innerHTML=renderFamilyHouseRows(houses);
  let title=document.querySelector('.card-title');
  if(title)title.textContent=`🏠 البيوت المطابقة (${houses.length})`;
}
function clearFamilyYearsFilter(){
  let ff=document.getElementById('famYearsFrom'),ft=document.getElementById('famYearsTo');
  if(ff)ff.value='';if(ft)ft.value='';
  renderMembersPage();
}

// ===== حذف عضو أسرة: يفك الربط عن الطرف التاني =====
const _origDeleteMember=(typeof deleteMember!=='undefined')?deleteMember:null;
if(_origDeleteMember){
  deleteMember=function(code,name){
    let m=(DB.members||[]).find(x=>x.code===code);
    if(m&&m.spouseCode){
      // فك الربط عن الطرف التاني قبل الحذف
      let peer=(DB.members||[]).find(x=>x.code===m.spouseCode);
      if(peer){
        let pu=Object.assign({},peer,{spouseCode:'',spouseName:''});
        let pi=DB.members.findIndex(x=>x.code===peer.code);if(pi>=0)DB.members[pi]=pu;
        // الحفظ هيتم داخل الأصلي؛ نضيف تحديث الطرف التاني بعده
        saveDB({membersPatch:{upsert:[pu]}});
      }
    }
    return _origDeleteMember(code,name);
  };
}
</script>
